pluginVersion: "0.1.0"
calibreDeploymentName: calibre
calibreNamespace: default
pluginDestDir: /config/.config/calibre/plugins
volumeName: config
# selectorLabels must match the existing calibre Deployment's pod selector labels.
# This is used to populate spec.selector in the strategic-merge patch so helm lint
# can validate the template; the selector itself is immutable in Kubernetes and will
# not change if it already matches the running Deployment.
selectorLabels:
  app.kubernetes.io/name: calibre

image:
  repository: curlimages/curl
  tag: 8.5.0

releaseUrlTemplate: "https://github.com/vavallee/bindery-plugins/releases/download/v-calibre-bridge-{{ .Values.pluginVersion }}/calibre-bridge-v{{ .Values.pluginVersion }}.zip"
