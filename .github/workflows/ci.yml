name: CI

on:
  push:
    branches: [main, development]
    tags: ["v*"]
  pull_request:
    branches: [main, development]

permissions:
  contents: read

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
      - name: Run tests
        run: |
          pytest plugins/calibre-bridge/tests \
            --cov=plugins/calibre-bridge/plugin \
            --cov-report=xml \
            --cov-report=term
      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage
          path: coverage.xml
          retention-days: 7

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
      - name: ruff check
        run: ruff check plugins/ scripts/
      - name: ruff format --check
        run: ruff format --check plugins/ scripts/
      - name: mypy
        run: mypy --ignore-missing-imports plugins/calibre-bridge/plugin scripts/

  build:
    name: build
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Build plugin zip
        run: python scripts/build_plugin.py plugins/calibre-bridge --output-dir dist
      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: calibre-bridge
          path: dist/
          retention-days: 30

  release:
    name: release
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Build plugin zip
        run: python scripts/build_plugin.py plugins/calibre-bridge --output-dir dist
      - name: Extract changelog section
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          VERSION="${VERSION#-calibre-bridge-}"
          VERSION="${VERSION#calibre-bridge-}"
          python <<'PY' > release_notes.md
          import os, re, pathlib
          version = os.environ['VERSION']
          text = pathlib.Path('CHANGELOG.md').read_text()
          pattern = re.compile(r'^### \[' + re.escape(version) + r'\].*?(?=^### \[|\Z)', re.M | re.S)
          m = pattern.search(text)
          print(m.group(0).strip() if m else f'Release {version}')
          PY
        env:
          VERSION: ${{ github.ref_name }}
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release_notes.md \
            dist/*.zip dist/*.sha256
